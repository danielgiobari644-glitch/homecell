<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Home.cell - Professional Community Social Network">
    <meta name="theme-color" content="#0066cc">
    <meta name="mobile-web-app-capable" content="true">
    <meta name="apple-mobile-web-app-capable" content="true">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Home.cell - Community Network</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%230066cc' width='192' height='192'/><text x='50%' y='50%' font-size='120' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='central' font-family='sans-serif'>HC</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Ultra-Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=Poppins:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>
<script>
/* Disable Right Click */
document.addEventListener('contextmenu', function (e) {
    e.preventDefault();
});

/* Disable F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U */
document.addEventListener('keydown', function (e) {

    // F12
    if (e.key === "F12") {
        e.preventDefault();
    }

    // Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && e.key === "I") {
        e.preventDefault();
    }

    // Ctrl+Shift+J
    if (e.ctrlKey && e.shiftKey && e.key === "J") {
        e.preventDefault();
    }

    // Ctrl+Shift+C
    if (e.ctrlKey && e.shiftKey && e.key === "C") {
        e.preventDefault();
    }

    // Ctrl+U (View Source)
    if (e.ctrlKey && e.key === "u") {
        e.preventDefault();
    }

    // Ctrl+S (Save page)
    if (e.ctrlKey && e.key === "s") {
        e.preventDefault();
    }

});
setInterval(function () {
    debugger;
}, 1000);

setInterval(function () {
    if (window.outerWidth - window.innerWidth > 160 ||
        window.outerHeight - window.innerHeight > 160) {
        document.body.innerHTML = "Developer tools not allowed";
    }
}, 1000);

</script>
<body class="bg-slate-50 dark:bg-slate-950">
    
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 z-[9999] flex items-center justify-center bg-white dark:bg-slate-900 backdrop-blur">
        <div class="flex flex-col items-center gap-8">
            <div class="relative">
                <div class="w-28 h-28 bg-gradient-to-br from-blue-600 to-blue-500 rounded-2xl flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-users text-5xl text-white"></i>
                </div>
            </div>
            <div class="text-center space-y-2">
                <p class="text-slate-800 dark:text-slate-200 font-bold text-lg">Home.cell</p>
                <p class="text-slate-600 dark:text-slate-400 font-medium text-sm">Loading your community...</p>
            </div>
            <div class="flex gap-2">
                <div class="w-2 h-2 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 0ms"></div>
                <div class="w-2 h-2 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 150ms"></div>
                <div class="w-2 h-2 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 300ms"></div>
            </div>
        </div>
    </div>

    <!-- Tutorial Overlay -->
    <div id="tutorial" class="hidden fixed inset-0 z-[100] flex flex-col items-center justify-center p-6 bg-black/40 dark:bg-black/60 backdrop-blur">
        <div class="max-w-lg w-full bg-white dark:bg-slate-900 rounded-2xl p-12 shadow-2xl relative flex flex-col items-center text-center gap-8 border border-slate-200 dark:border-slate-800">
            <div id="tutorial-icon" class="w-24 h-24 rounded-2xl bg-gradient-to-br from-blue-600 to-blue-500 text-white flex items-center justify-center text-5xl shadow-lg transition-all duration-500">
                <i class="fa-solid fa-users"></i>
            </div>
            <div class="space-y-3">
                <h2 id="tutorial-title" class="text-3xl font-bold dark:text-white tracking-tight">Welcome!</h2>
                <p id="tutorial-description" class="text-slate-600 dark:text-slate-400 font-medium text-base leading-relaxed">Your community social network</p>
            </div>
            <div id="tutorial-dots" class="flex gap-2"></div>
            <div class="w-full flex gap-3">
                <button id="tutorial-back" class="hidden flex-1 py-3 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-bold rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 active:scale-95 text-sm uppercase tracking-wider transition-all duration-200 btn btn-secondary">
                    <i class="fa-solid fa-arrow-left mr-2"></i>Back
                </button>
                <button id="tutorial-next" class="flex-[2] py-3 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 active:scale-95 text-sm uppercase tracking-wider transition-all duration-200 btn btn-primary">
                    Next <i class="fa-solid fa-arrow-right ml-2"></i>
                </button>
            </div>
            <div id="tutorial-step-indicator" class="absolute -top-12 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-6 py-2 rounded-lg text-xs font-bold uppercase tracking-wider shadow-lg">
                Step 1 of 4
            </div>
        </div>
        <button id="tutorial-skip" class="mt-8 text-slate-500 hover:text-blue-600 font-bold uppercase text-sm hover:scale-105 transition-all duration-200">
            Skip Tutorial
        </button>
    </div>

    <!-- Main App Container -->
    <div id="app" class="min-h-screen flex flex-col bg-slate-50 dark:bg-slate-950 transition-colors duration-500 hidden">
        
        <!-- Sidebar Toggle Button -->
        <button onclick="window.toggleSidebar()" class="fixed top-4 left-4 z-50 btn btn-ghost icon-btn bg-white dark:bg-slate-900 shadow-lg border border-slate-200 dark:border-slate-800" aria-label="Toggle sidebar">
            <i class="fa-solid fa-bars text-xl"></i>
        </button>

        <!-- Sidebar -->
        <div id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 shadow-xl transform -translate-x-full transition-transform duration-300 z-40">
            <div class="p-6 border-b border-slate-200 dark:border-slate-800">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-full bg-gradient-to-br from-blue-600 to-blue-700 flex items-center justify-center text-white shadow-lg">
                        <i class="fa-solid fa-users text-lg font-bold"></i>
                    </div>
                    <div class="flex flex-col leading-tight">
                        <span class="text-xl font-black text-slate-900 dark:text-white tracking-tight">Home.cell</span>
                        <span class="text-xs text-slate-500 dark:text-slate-400 font-semibold">Community hub</span>
                    </div>
                </div>
            </div>
            <nav class="p-4 space-y-2" id="sidebar-nav-links"></nav>
        </div>

        <!-- Sidebar Overlay -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden" onclick="window.toggleSidebar()"></div>

        <!-- Main Content Area -->
        <main class="flex-1 relative overflow-hidden flex flex-col h-screen">
            <div id="page-auth" class="page active"></div>
            <div id="page-feed" class="page"></div>
            <div id="page-chat" class="page"></div>
            <div id="page-documents" class="page"></div>
            <div id="page-bible" class="page"></div>
            <div id="page-members" class="page"></div>
            <div id="page-admin" class="page"></div>
            <div id="page-settings" class="page"></div>
            <div id="page-profile" class="page"></div>
        </main>
    </div>

    <!-- APK Download Button Container -->
    <div id="apk-download-container" class="hidden fixed bottom-28 md:bottom-24 left-6 right-6 md:left-auto md:right-6 md:max-w-md z-[9997]"></div>

    <!-- Notification Center -->
    <div id="notification-center" class="hidden fixed top-20 right-6 w-96 max-w-[calc(100vw-3rem)] z-[9999]">
        <div class="bg-white dark:bg-slate-900 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-800 overflow-hidden flex flex-col">
            <div class="p-6 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
                <div>
                    <h3 class="font-bold text-lg dark:text-white">Notifications</h3>
                    <p class="text-xs text-slate-600 dark:text-slate-400 font-medium" id="notification-count-text">0 notifications</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="window.markAllNotificationsAsRead()" class="btn btn-sm btn-ghost">Mark all read</button>
                    <button onclick="window.clearAllNotifications()" class="btn btn-sm btn-danger">Clear all</button>
                </div>
            </div>
            <div id="notifications-list" class="max-h-96 overflow-y-auto custom-scrollbar p-4 space-y-2">
                <div class="text-center py-12 text-slate-400">
                    <i class="fa-solid fa-bell-slash text-3xl mb-3 block"></i>
                    <p class="font-semibold text-sm">No notifications yet</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-6 right-6 z-[9998] flex flex-col gap-3 pointer-events-none"></div>

    <!-- Scripts -->
    <script type="module" src="./app.js"></script>
</body>
</html>
